<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OBC 12u Stats Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f8f6;
  --sf: #ffffff;
  --sf2: #f0f0ec;
  --sf3: #e8e8e2;
  --bd: #d4d4cc;
  --tx: #1a1a1a;
  --tx2: #4b5563;
  --tx3: #9ca3af;
  --ac: #b45309;
  --ac2: #92400e;
  --acb: rgba(180,83,9,0.08);
  --gn: #059669;
  --gnb: rgba(5,150,105,0.1);
  --rd: #dc2626;
  --rdb: rgba(220,38,38,0.08);
  --bl: #2563eb;
  --blb: rgba(37,99,235,0.08);
  --pp: #7c3aed;
  --ppb: rgba(124,58,237,0.08);
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', -apple-system, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--sans); background:var(--bg); color:var(--tx); min-height:100vh; -webkit-font-smoothing:antialiased; }
::selection { background:var(--ac); color:#fff; }

/* Header */
.hdr { position:sticky; top:0; z-index:50; background:var(--bg); border-bottom:1px solid var(--bd); padding:12px 16px; }
.hdr-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px; }
.hdr-title { font-family:var(--mono); font-size:14px; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; color:var(--ac); }
.hdr-ts { font-family:var(--mono); font-size:10px; color:var(--tx3); }

/* Filters */
.filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.flt { font-family:var(--mono); font-size:11px; font-weight:600; padding:6px 12px; border-radius:4px;
  border:1px solid var(--bd); background:var(--sf); color:var(--tx2); cursor:pointer; appearance:none;
  -webkit-appearance:none; }
.flt:focus { outline:none; border-color:var(--ac); }
.flt option { background:var(--sf); color:var(--tx); }

/* Nav tabs */
.nav { display:flex; gap:2px; border-bottom:1px solid var(--bd); padding:0 16px; background:var(--bg);
  position:sticky; top:57px; z-index:40; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.nav::-webkit-scrollbar { display:none; }
.nav-btn { font-family:var(--mono); font-size:11px; font-weight:700; padding:10px 14px; background:none;
  border:none; color:var(--tx3); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
  transition:color 0.15s; }
.nav-btn:hover { color:var(--tx2); }
.nav-btn.a { color:var(--ac); border-bottom-color:var(--ac); }

/* Content */
.content { padding:12px 16px 80px; max-width:1200px; margin:0 auto; }

/* Tables */
.tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; margin-bottom:16px; border-radius:6px;
  border:1px solid var(--bd); background:var(--sf); }
.tbl { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:11px; white-space:nowrap; }
.tbl th { padding:8px 10px; text-align:right; font-weight:700; color:var(--tx3); font-size:10px;
  letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid var(--bd); cursor:pointer;
  user-select:none; position:sticky; top:0; background:var(--sf2); z-index:2; }
.tbl th:first-child { text-align:left; position:sticky; left:0; z-index:3; min-width:130px; }
.tbl th:hover { color:var(--ac); }
.tbl th.sorted { color:var(--ac); }
.tbl th.sorted::after { content:' ▾'; }
.tbl th.sorted.asc::after { content:' ▴'; }
.tbl td { padding:6px 10px; text-align:right; border-bottom:1px solid var(--bd); color:var(--tx2); }
.tbl td:first-child { text-align:left; font-weight:600; color:var(--tx); position:sticky; left:0;
  background:var(--sf); z-index:1; }
.tbl tr:hover td { background:var(--sf2); }
.tbl tr:hover td:first-child { background:var(--sf2); }
.tbl .num { font-variant-numeric:tabular-nums; }
.tbl .hi { color:var(--gn); font-weight:700; }
.tbl .lo { color:var(--rd); }
.tbl .avg { color:var(--ac); font-weight:700; }

/* Scouting cards */
.card { background:var(--sf); border:1px solid var(--bd); border-radius:6px; margin-bottom:8px; overflow:hidden; }
.card-hdr { padding:10px 14px; display:flex; align-items:center; gap:10px; cursor:pointer;
  user-select:none; -webkit-tap-highlight-color:transparent; }
.card-hdr:hover { background:var(--sf2); }
.jersey { width:36px; height:36px; border-radius:50%; background:var(--sf3); display:flex;
  align-items:center; justify-content:center; font-family:var(--mono); font-weight:800; font-size:12px;
  flex-shrink:0; color:var(--ac); }
.card-info { flex:1; min-width:0; }
.card-name { font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.card-sub { font-family:var(--mono); font-size:10px; color:var(--tx3); overflow:hidden;
  text-overflow:ellipsis; white-space:nowrap; }
.card-arrow { font-size:14px; color:var(--tx3); transition:transform 0.2s; }
.card-arrow.open { transform:rotate(180deg); }
.card-body { padding:0 14px 14px; border-top:1px solid var(--bd); display:none; }
.card-body.open { display:block; }

/* Tags */
.tags { display:flex; flex-wrap:wrap; gap:3px; margin:8px 0; }
.tag { display:inline-block; padding:2px 7px; border-radius:3px; font-family:var(--mono);
  font-size:9px; font-weight:700; letter-spacing:0.04em; }

/* Stat grid */
.sg { display:grid; gap:6px; margin-bottom:10px; }
.sg3 { grid-template-columns:repeat(3,1fr); }
.sg4 { grid-template-columns:repeat(4,1fr); }
.sb { background:var(--sf3); border-radius:4px; padding:6px; text-align:center; }
.sv { font-family:var(--mono); font-size:13px; font-weight:700; }
.sl { font-size:9px; color:var(--tx3); text-transform:uppercase; letter-spacing:0.05em; }

/* Analysis boxes */
.abox { border-radius:6px; padding:10px; margin-bottom:6px; border:1px solid; }
.abox-t { font-family:var(--mono); font-size:9px; font-weight:700; margin-bottom:4px;
  letter-spacing:0.06em; text-transform:uppercase; }
.abox-b { font-size:12px; line-height:1.5; margin-bottom:3px; }
.abox.amber { background:#fef3c7; border-color:#fcd34d; color:#78350f; }
.abox.amber .abox-t { color:#92400e; }
.abox.blue { background:#dbeafe; border-color:#93c5fd; color:#1e3a5f; }
.abox.blue .abox-t { color:#1e40af; }
.abox.green { background:#dcfce7; border-color:#86efac; color:#14532d; }
.abox.green .abox-t { color:#166534; }
.abox.red { background:#fee2e2; border-color:#fca5a5; color:#7f1d1d; }
.abox.red .abox-t { color:#991b1b; }

/* Hit sparkline */
.spark { display:flex; gap:1px; align-items:flex-end; height:20px; margin-bottom:8px; }
.spark-bar { width:7px; border-radius:1px; }

/* Leaderboard */
.lb-row { display:flex; align-items:center; gap:12px; padding:8px 12px; border-bottom:1px solid var(--bd); }
.lb-rank { font-family:var(--mono); font-weight:800; font-size:14px; color:var(--tx3); width:28px;
  text-align:center; flex-shrink:0; }
.lb-rank.g { color:var(--ac); }
.lb-name { flex:1; font-weight:600; font-size:13px; }
.lb-team { font-family:var(--mono); font-size:10px; color:var(--tx3); }
.lb-val { font-family:var(--mono); font-weight:800; font-size:16px; color:var(--ac); }

/* Section headings */
.sec { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--tx3); margin:20px 0 10px; }

/* Our team badge */
.our { display:inline-block; padding:1px 6px; border-radius:3px; font-family:var(--mono);
  font-size:9px; font-weight:700; background:var(--acb); color:var(--ac); margin-left:6px; }

/* Toggle (Team / Individual) */
.toggle { display:inline-flex; gap:0; border:1px solid var(--bd); border-radius:4px; overflow:hidden;
  margin-bottom:12px; font-family:var(--mono); font-size:10px; font-weight:700; }
.toggle-btn { padding:6px 14px; background:transparent; border:none; color:var(--tx3); cursor:pointer;
  letter-spacing:0.04em; }
.toggle-btn.a { background:var(--ac); color:#fff; }

/* Empty state */
.empty { text-align:center; padding:40px; color:var(--tx3); font-size:13px; }

@media (max-width:600px) {
  .tbl { font-size:10px; }
  .tbl th, .tbl td { padding:5px 6px; }
  .sg4 { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>

function makeTable(id, cols, rows, defaultSort, defaultDir) {
  if (!rows.length) return '<div class="empty">No data for this filter</div>';
  var st = sortState[id] || { col: defaultSort || cols[0].k, dir: defaultDir || 'desc' };
  sortState[id] = st;
  var sorted = rows.slice().sort(function(a,b) {
    var va = a[st.col], vb = b[st.col];
    if (typeof va === 'string') return st.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return st.dir === 'asc' ? va - vb : vb - va;
  });
  var h = '<div class="tbl-wrap"><table class="tbl"><thead><tr>';
  cols.forEach(function(c) {
    var cls = st.col === c.k ? ' class="sorted'+(st.dir==='asc'?' asc':'')+'"' : '';
    var q = String.fromCharCode(39);
    h += '<th'+cls+' onclick="sortTbl('+q+id+q+','+q+c.k+q+')">'+c.l+'</th>';
  });
  h += '</tr></thead><tbody>';
  sorted.forEach(function(r) {
    h += '<tr>';
    cols.forEach(function(c,i) {
      var v = r[c.k];
      if (c.fmt === 'avg' && typeof v === 'number') v = v > 0 ? v.toFixed(3) : '.000';
      else if (c.fmt === 'pct' && typeof v === 'number') v = v.toFixed(1) + '%';
      else if (c.fmt === 'era' && typeof v === 'number') v = v >= 999 ? '—' : v.toFixed(2);
      else if (c.fmt === 'dec2' && typeof v === 'number') v = v >= 999 ? '—' : v.toFixed(2);
      else if (c.fmt === 'dec1' && typeof v === 'number') v = v.toFixed(1);
      h += '<td>'+(v === 0 && i > 0 && c.fmt !== 'avg' ? '<span style="color:var(--tx3)">0</span>' : v)+'</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}

function sortTbl(id, col) {
  var st = sortState[id] || {};
  if (st.col === col) st.dir = st.dir === 'desc' ? 'asc' : 'desc';
  else { st.col = col; st.dir = col === 'P' || col === 'Date' ? 'asc' : 'desc'; }
  sortState[id] = st;
  render();
}

// Aggregate batting rows into team totals
function aggBatting(keys) {
  var teams = [];
  keys.forEach(function(k) {
    var t = D[k];
    var r = {P:t.n,G:t.g,PA:0,AB:0,R:0,H:0,B1:0,B2:0,B3:0,HR:0,RBI:0,BB:0,SO:0,HBP:0,SF:0,SB:0,HHn:0,BIP:0,FPSn:0};
    t.b.forEach(function(b) {
      r.PA+=b.PA; r.AB+=b.AB; r.R+=b.R; r.H+=b.H; r.B2+=b.B2; r.B3+=b.B3; r.HR+=b.HR;
      r.RBI+=b.RBI; r.BB+=b.BB; r.SO+=b.SO; r.HBP+=b.HBP; r.SF+=b.SF; r.SB+=b.SB;
      r.B1+=b.B1; r.HHn+=b.HHn; r.BIP+=b.BIP; r.FPSn+=(b.FPS/100)*b.PA;
    });
    r.AVG = r.AB > 0 ? r.H / r.AB : 0;
    r.OBP = (r.AB+r.BB+r.HBP+r.SF) > 0 ? (r.H+r.BB+r.HBP)/(r.AB+r.BB+r.HBP+r.SF) : 0;
    var tb = r.B1 + r.B2*2 + r.B3*3 + r.HR*4;
    r.SLG = r.AB > 0 ? tb / r.AB : 0;
    r.OPS = r.OBP + r.SLG;
    r.FPS = r.PA > 0 ? (r.FPSn / r.PA) * 100 : 0;
    r.HH = r.BIP > 0 ? (r.HHn / r.BIP) * 100 : 0;
    r._team = t.n; r._our = t.is_our_team;
    teams.push(r);
  });
  return teams;
}

// Aggregate pitching rows into team totals
function aggPitching(keys) {
  var teams = [];
  keys.forEach(function(k) {
    var t = D[k];
    var r = {P:t.n,G:t.g,BF:0,AB:0,H:0,R:0,ER:0,BB:0,SO:0,HBP:0,HR:0,Pit:0,GB:0,AO:0,
      outs:0,fps_n:0,fps_d:0,str_n:0,hha:0,bip:0};
    t.p.forEach(function(p) {
      r.BF+=p.BF; r.AB+=p.AB; r.H+=p.H; r.R+=p.R; r.ER+=p.ER; r.BB+=p.BB; r.SO+=p.SO;
      r.HBP+=p.HBP; r.HR+=p.HR; r.Pit+=p.Pit; r.GB+=p.GB; r.AO+=p.AO;
      // Parse IP string to outs
      var parts = p.IP.split('.');
      r.outs += parseInt(parts[0])*3 + parseInt(parts[1]||'0');
      r.fps_n += (p.FPS/100)*p.BF; r.fps_d += p.BF;
      r.str_n += (p.Spct/100)*p.Pit;
      r.hha += (p.HHp/100)*(p.BF>0?p.BF:0); r.bip += p.BF;
    });
    var ip = r.outs / 3;
    r.IP = Math.floor(r.outs/3)+'.'+(r.outs%3);
    r.ERA = ip > 0 ? (r.ER * 6) / ip : 999;
    r.WHIP = ip > 0 ? (r.BB + r.H) / ip : 999;
    r.BAA = r.AB > 0 ? r.H / r.AB : 0;
    r.Kp = r.BF > 0 ? (r.SO / r.BF) * 100 : 0;
    r.PBF = r.BF > 0 ? r.Pit / r.BF : 0;
    r.FPS = r.fps_d > 0 ? (r.fps_n / r.fps_d) * 100 : 0;
    r.Spct = r.Pit > 0 ? (r.str_n / r.Pit) * 100 : 0;
    r.GBAO = r.AO > 0 ? (r.GB / r.AO).toFixed(2) : '';
    r.HHp = r.bip > 0 ? (r.hha / r.bip) * 100 : 0;
    r._team = t.n; r._our = t.is_our_team;
    teams.push(r);
  });
  return teams;
}

// Hitter tags
function hTags(b) {
  var t = [];
  if (b.OPS >= 1.2) t.push({l:'ELITE',c:'#ef4444'});
  else if (b.OPS >= 1.0) t.push({l:'DANGEROUS',c:'#f59e0b'});
  if (b.AVG >= 0.500 && b.PA >= 15) t.push({l:'HIGH AVG',c:'#10b981'});
  if (b.HR >= 5) t.push({l:'POWER',c:'#8b5cf6'});
  else if (b.HR >= 3) t.push({l:'POP',c:'#a78bfa'});
  if (b.FPS >= 70) t.push({l:'AGGRESSIVE',c:'#f97316'});
  if (b.FPS < 46) t.push({l:'PATIENT',c:'#06b6d4'});
  if (b.HH >= 35) t.push({l:'HARD HITTER',c:'#dc2626'});
  if (b.PA > 0 && b.SO / b.PA >= 0.25) t.push({l:'K PRONE',c:'#f87171'});
  if (b.PA > 0 && b.BB / b.PA >= 0.18) t.push({l:'WALKS',c:'#34d399'});
  if (b.PA >= 10 && b.HBP / b.PA >= 0.12) t.push({l:'GETS HIT',c:'#fb923c'});
  return t;
}

// Pitcher tags
function pTags(p) {
  var t = [], br = p.BB / p.BF;
  if (p.Kp >= 25) t.push({l:'STRIKEOUT',c:'#8b5cf6'});
  if (br >= 0.15) t.push({l:'WILD',c:'#ef4444'});
  if (p.HBP / p.BF >= 0.065) t.push({l:'HITS BATTERS',c:'#f97316'});
  if (p.FPS >= 68) t.push({l:'GETS AHEAD',c:'#10b981'});
  if (p.FPS < 50) t.push({l:'FALLS BEHIND',c:'#f59e0b'});
  if (p.BAA >= 0.38) t.push({l:'HITTABLE',c:'#ef4444'});
  if (p.BAA <= 0.2) t.push({l:'TOUGH',c:'#059669'});
  if (p.GB > p.AO * 2) t.push({l:'GROUNDBALL',c:'#6366f1'});
  if (p.PBF >= 3.8) t.push({l:'HIGH COUNTS',c:'#f59e0b'});
  if (p.HHp >= 30) t.push({l:'GETS HIT HARD',c:'#dc2626'});
  if (p.Spct >= 65) t.push({l:'HIGH STRIKE%',c:'#10b981'});
  if (p.Spct > 0 && p.Spct < 55) t.push({l:'LOW STRIKE%',c:'#ef4444'});
  return t;
}

function tagHTML(tags) {
  return tags.map(function(x) {
    return '<span class="tag" style="background:'+x.c+'18;color:'+x.c+';border:1px solid '+x.c+'44">'+x.l+'</span>';
  }).join('');
}

// Hitter advice
function hAdvice(b) {
  var a = [];
  if (b.FPS >= 70) a.push("Ultra-aggressive — swings at "+b.FPS.toFixed(0)+"% of first pitches. Start off-speed or nibble edges.");
  else if (b.FPS >= 60) a.push("Swings early ("+b.FPS.toFixed(0)+"% FPS). Don't give him a fastball to hit pitch one.");
  if (b.PA > 0 && b.SO / b.PA <= 0.06 && b.AVG >= 0.4 && b.PA >= 20) a.push("Almost never strikes out and hits everything. Pitch around with runners on.");
  if (b.PA > 0 && b.SO / b.PA >= 0.25) a.push("K prone ("+(b.SO/b.PA*100).toFixed(0)+"% K rate). Challenge with fastballs, expand the zone.");
  if (b.HR >= 5) a.push("Major power — "+b.HR+" HR. Keep everything down and away.");
  else if (b.HR >= 3) a.push("Power threat ("+b.HR+" HR). Keep the ball down.");
  if (b.OPS >= 1.5) a.push("Elite hitter ("+b.OPS.toFixed(3)+" OPS). Pitch around with runners on.");
  if (b.HH >= 40) a.push("Crushes the ball — "+b.HH.toFixed(0)+"% hard hit. Nothing over the plate.");
  if (b.PA > 0 && b.BB / b.PA > 0.18) a.push("Very patient — walks "+(b.BB/b.PA*100).toFixed(0)+"%. Must throw strikes.");
  if (b.FPS < 46) a.push("Patient ("+b.FPS.toFixed(0)+"% FPS). Takes first pitch — use that free strike.");
  return a;
}

// Pitcher analysis
function pCommand(p) {
  var a = [], br = p.BB / p.BF;
  if (br >= 0.20) a.push("Poor command — walks "+Math.round(br*100)+"% of batters.");
  else if (br >= 0.15) a.push("Below average command — "+Math.round(br*100)+"% walk rate.");
  else if (br <= 0.07) a.push("Excellent command — only "+Math.round(br*100)+"% walk rate.");
  if (p.Spct >= 65) a.push("High strike rate ("+p.Spct.toFixed(0)+"%). Stays in the zone.");
  else if (p.Spct > 0 && p.Spct < 55) a.push("Low strike rate ("+p.Spct.toFixed(0)+"%). Struggles to find the zone.");
  if (p.FPS >= 70) a.push("Gets ahead with "+p.FPS.toFixed(0)+"% first-pitch strikes.");
  else if (p.FPS < 48) a.push("Falls behind often — only "+p.FPS.toFixed(0)+"% first-pitch strikes.");
  return a;
}

function pStrength(p) {
  var a = [];
  if (p.Kp >= 25) a.push("Strikeout pitcher — "+p.Kp.toFixed(0)+"% K rate. Can miss bats.");
  else if (p.Kp >= 18) a.push("Gets his share of Ks ("+p.Kp.toFixed(0)+"% K rate).");
  else a.push("Low K rate ("+p.Kp.toFixed(0)+"%). Relies on contact, not strikeouts.");
  if (p.GB > p.AO * 2) a.push("Heavy groundball pitcher (GB/FO "+p.GBAO+"). Induces weak ground contact.");
  if (p.BAA <= 0.25) a.push("Tough to hit ("+p.BAA.toFixed(3)+" BAA). Hitters struggle to barrel him.");
  return a;
}

function pExploit(p) {
  var a = [], br = p.BB / p.BF;
  if (br >= 0.15) a.push("Take early. Force strikes — walks snowball.");
  if (p.FPS < 48) a.push("Take first pitch — he falls behind "+Math.round(100-p.FPS)+"% of the time.");
  if (p.FPS >= 70 && br <= 0.10) a.push("Attacks early and it works. Be ready pitch one.");
  if (p.BAA >= 0.35) a.push("Hittable ("+p.BAA.toFixed(3)+" BAA). Swing at strikes, don't chase.");
  if (p.HHp >= 30) a.push("Gets hit hard ("+p.HHp.toFixed(0)+"% HH). Swing with authority.");
  if (p.PBF >= 3.8) a.push("Batters grind him ("+p.PBF.toFixed(1)+" P/BF). Work counts.");
  if (p.GB > p.AO * 2) a.push("Heavy GB pitcher — look to elevate.");
  return a;
}

    }).join('') + '</div></div>';
}

        if (exp.length) {
          h += '<div class="abox red"><div class="abox-t">🎯 How To Beat Him</div>';
          exp.forEach(function(a) { h += '<div class="abox-b">'+a+'</div>'; });
          h += '</div>';
        }
        h += '</div>';
      }
      h += '</div>';
    });
  });
  return h;
}

// === LEADERBOARD TAB ===
function renderLeaders() {
  var keys = getTeams();
  // Collect all batters and pitchers with team label
  var allB = [], allP = [];
  keys.forEach(function(k) {
    var t = D[k];
    t.b.forEach(function(b) {
      allB.push(Object.assign({_team:t.n, _our:t.is_our_team}, b));
    });
    t.p.forEach(function(p) {
      allP.push(Object.assign({_team:t.n, _our:t.is_our_team}, p));
    });
  });
  
  function lbSection(title, arr, key, fmt, minField, minVal, limit) {
    var filtered = arr.filter(function(x) { return (x[minField] || 0) >= minVal; });
    filtered.sort(function(a,b) { return b[key] - a[key]; });
    if (fmt === 'low') {
      filtered.sort(function(a,b) { return a[key] - b[key]; });
    }
    filtered = filtered.slice(0, limit || 10);
    if (!filtered.length) return '';
    var h = '<div class="sec">' + title + '</div><div class="card" style="cursor:default">';
    filtered.forEach(function(r, i) {
      h += '<div class="lb-row"><div class="lb-rank'+(i<3?' g':'')+'">'+( i+1)+'</div>';
      h += '<div style="flex:1"><div class="lb-name">'+r.P+(r._our?' <span class="our">★</span>':'')+'</div>';
      h += '<div class="lb-team">'+r._team+'</div></div>';
      var v = r[key];
      if (fmt === 'avg' || fmt === 'low') v = typeof v === 'number' ? v.toFixed(3) : v;
      else if (fmt === 'pct') v = v.toFixed(1) + '%';
      else if (fmt === 'era') v = v >= 999 ? '—' : v.toFixed(2);
      else if (fmt === 'dec1') v = v.toFixed(1);
      h += '<div class="lb-val">'+v+'</div></div>';
    });
    h += '</div>';
    return h;
  }
  
  var h = '';
  h += '<div class="sec" style="color:var(--ac);font-size:12px">BATTING LEADERBOARDS</div>';
  h += lbSection('OPS (min 15 PA)', allB, 'OPS', 'avg', 'PA', 15, 15);
  h += lbSection('Batting Average (min 15 PA)', allB, 'AVG', 'avg', 'PA', 15, 15);
  h += lbSection('Home Runs', allB, 'HR', 'int', 'HR', 1, 15);
  h += lbSection('RBI', allB, 'RBI', 'int', 'RBI', 1, 15);
  h += lbSection('Hard Hit% (min 10 BIP)', allB, 'HH', 'pct', 'BIP', 10, 15);
  
  h += '<div class="sec" style="color:var(--ac);font-size:12px;margin-top:24px">PITCHING LEADERBOARDS</div>';
  h += lbSection('ERA (min 3 IP)', allP, 'ERA', 'era', 'BF', 12, 15);
  h += lbSection('Strikeout % (min 15 BF)', allP, 'Kp', 'pct', 'BF', 15, 15);
  h += lbSection('WHIP (min 3 IP)', allP, 'WHIP', 'low', 'BF', 12, 15);
  h += lbSection('Strike% (min 30 pitches)', allP, 'Spct', 'pct', 'Pit', 30, 15);
  
  return h || '<div class="empty">No data for this filter</div>';
}

// Main render
function render() {
  var ct = document.getElementById('ct');
  switch(curTab) {
    case 'batting': ct.innerHTML = renderBatting(); break;
    case 'pitching': ct.innerHTML = renderPitching(); break;
    case 'bat-log': ct.innerHTML = renderBatLog(); break;
    case 'pitch-log': ct.innerHTML = renderPitchLog(); break;
    case 'scouting': ct.innerHTML = renderScouting(); break;
    case 'leaders': ct.innerHTML = renderLeaders(); break;
  }
}

initFilters();
render();
</script>
